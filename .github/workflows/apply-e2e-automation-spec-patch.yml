name: Apply E2E generic spec-fixer patch

on:
  workflow_dispatch:
    inputs:
      feature_area:
        description: "Feature area being tested"
        required: false
        type: string
      attempt:
        description: "Next attempt number"
        required: false
        type: string
        default: "2"

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - name: Check for patches in repo-memory and apply
        env:
          GH_TOKEN: ${{ secrets.MAINTAINER_PAT }}
        run: |
          REPO="${{ github.repository }}"

          # Wait for push_repo_memory to finish (it runs in parallel with safe_outputs
          # which dispatches this workflow, so the patch may not be on the branch yet)
          PATCH_FOUND=false
          for i in 1 2 3 4 5 6; do
            echo "Attempt $i: cloning memory/default branch..."
            rm -rf /tmp/repo-memory
            git clone --depth 1 --branch memory/default \
              "https://x-access-token:${GH_TOKEN}@github.com/$REPO.git" \
              /tmp/repo-memory 2>/dev/null || {
              echo "No memory/default branch found."
              if [ "$i" -lt 6 ]; then
                echo "Waiting 15s before retry..."
                sleep 15
                continue
              fi
              echo "Giving up after $i attempts, skipping."
              exit 0
            }

            # Check for patch files at root level
            if ls /tmp/repo-memory/e2e-pr-*.patch 1>/dev/null 2>&1; then
              PATCH_FOUND=true
              echo "Found patch files on attempt $i"
              break
            fi

            echo "No patch files found yet on attempt $i"
            if [ "$i" -lt 6 ]; then
              echo "Waiting 15s for push_repo_memory to complete..."
              sleep 15
            fi
          done

          if [ "$PATCH_FOUND" != "true" ]; then
            echo "No e2e patch files found in repo-memory after 6 attempts, skipping."
            exit 0
          fi

          PATCH_DIR="/tmp/repo-memory"

          # Detect feature_area from inputs or infer later from PR branch
          FEATURE_AREA="${{ github.event.inputs.feature_area }}"

          # Process each e2e patch file (named e2e-pr-<number>.patch)
          for PATCH_FILE in "$PATCH_DIR"/e2e-pr-*.patch; do
            FILENAME=$(basename "$PATCH_FILE")
            PR_NUMBER=$(echo "$FILENAME" | sed 's/e2e-pr-\([0-9]*\)\.patch/\1/')

            echo "Found e2e patch for PR #$PR_NUMBER: $FILENAME"

            # Verify patch file is not empty
            if [ ! -s "$PATCH_FILE" ]; then
              echo "Patch file is empty, skipping."
              continue
            fi

            PATCH_SIZE=$(wc -c < "$PATCH_FILE")
            echo "Patch size: $PATCH_SIZE bytes"

            # Get PR details
            PR_DATA=$(gh pr view "$PR_NUMBER" --repo "$REPO" \
              --json headRefName,headRepository,headRepositoryOwner,maintainerCanModify,state 2>/dev/null) || {
              echo "PR #$PR_NUMBER not found or not accessible, skipping."
              continue
            }

            PR_STATE=$(echo "$PR_DATA" | jq -r '.state')
            if [ "$PR_STATE" != "OPEN" ]; then
              echo "PR #$PR_NUMBER is $PR_STATE, cleaning up patch and skipping."
              rm "$PATCH_FILE"
              continue
            fi

            HEAD_REF=$(echo "$PR_DATA" | jq -r '.headRefName')
            HEAD_OWNER=$(echo "$PR_DATA" | jq -r '.headRepositoryOwner.login')
            HEAD_REPO_NAME=$(echo "$PR_DATA" | jq -r '.headRepository.name')
            CAN_MODIFY=$(echo "$PR_DATA" | jq -r '.maintainerCanModify')

            REPO_OWNER=$(echo "$REPO" | cut -d'/' -f1)

            echo "PR #$PR_NUMBER is from $HEAD_OWNER/$HEAD_REPO_NAME, branch $HEAD_REF"
            echo "Maintainer can modify: $CAN_MODIFY"

            # If same-repo PR, we can always push (PAT has access).
            # Only block if it's a true cross-fork PR AND maintainerCanModify is false.
            if [ "$HEAD_OWNER" != "$REPO_OWNER" ] && [ "$CAN_MODIFY" != "true" ]; then
              echo "Cross-fork PR with maintainer edits not allowed. Cannot push."
              gh pr comment "$PR_NUMBER" --repo "$REPO" \
                --body "⚠️ **E2E auto-apply failed**: This PR does not allow maintainer edits."
              continue
            fi

            # Detect feature_area from branch name if not provided
            if [ -z "$FEATURE_AREA" ]; then
              FEATURE_AREA=$(echo "$HEAD_REF" | sed -n 's/test\/e2e-\(.*\)-spec/\1/p')
              echo "Auto-detected feature_area from branch: $FEATURE_AREA"
            fi

            # Clone the target branch
            FORK_DIR="/tmp/fork-$PR_NUMBER"
            FORK_URL="https://x-access-token:${GH_TOKEN}@github.com/$HEAD_OWNER/$HEAD_REPO_NAME.git"
            git clone --depth 1 --branch "$HEAD_REF" "$FORK_URL" "$FORK_DIR" || {
              echo "Failed to clone fork, skipping."
              gh pr comment "$PR_NUMBER" --repo "$REPO" \
                --body "⚠️ **E2E auto-apply failed**: Could not clone the fork branch."
              continue
            }

            cd "$FORK_DIR"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            PATCH_COMMITTED=false
            if git am --ignore-whitespace "$PATCH_FILE" 2>/dev/null; then
              echo "Patch applied (git am)"
              PATCH_COMMITTED=true
            elif git apply --ignore-whitespace "$PATCH_FILE" 2>/dev/null; then
              echo "Patch applied (git apply)"
            elif git apply --ignore-whitespace --3way "$PATCH_FILE" 2>/dev/null; then
              echo "Patch applied (git apply --3way)"
            elif patch -p1 --fuzz=3 < "$PATCH_FILE" 2>/dev/null; then
              echo "Patch applied (patch --fuzz=3)"
            else
              echo "Patch apply failed (all methods)"
              gh pr comment "$PR_NUMBER" --repo "$REPO" \
                --body "⚠️ **E2E auto-apply failed**: The patch could not be applied cleanly."
              cd /tmp
              continue
            fi

            if [ "$PATCH_COMMITTED" != "true" ]; then
              git add -A
              git commit -m "fix(e2e): apply generic spec-fixer patch ($FEATURE_AREA)
              
              Co-authored-by: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
            fi

            if git push origin "$HEAD_REF"; then
              echo "Patch pushed successfully to fork branch"
              gh pr comment "$PR_NUMBER" --repo "$REPO" \
                --body "✅ **E2E spec-fix applied** ($FEATURE_AREA) — re-triggering the E2E spec runner."

              # Clean up the patch file from repo-memory
              rm "$PATCH_FILE"

              # Use attempt from workflow input
              ATTEMPT="${{ github.event.inputs.attempt }}"

              # Dispatch the generic E2E runner (use GITHUB_TOKEN which has actions:write)
              GH_TOKEN="${{ github.token }}" gh workflow run e2e-automation-spec-runner.yml \
                --repo "$REPO" \
                --ref main \
                -f feature_area="$FEATURE_AREA" \
                -f pr_number="$PR_NUMBER" \
                -f attempt="$ATTEMPT" || echo "Warning: Failed to dispatch spec runner"
              echo "Dispatched E2E Automation Spec Runner for PR #$PR_NUMBER, feature=$FEATURE_AREA, attempt=$ATTEMPT"
            else
              echo "Push to fork failed"
              gh pr comment "$PR_NUMBER" --repo "$REPO" \
                --body "⚠️ **E2E auto-apply failed**: Could not push to the fork branch."
            fi

            cd /tmp
          done

          # Push cleanup changes back to repo-memory (remove applied patches)
          cd /tmp/repo-memory
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git add -A && git diff --cached --quiet; then
            echo "No patches to clean up."
          else
            git commit -m "chore: clean up applied generic e2e spec-fixer patches"
            git push origin memory/default
            echo "Cleaned up applied patches from repo-memory."
          fi
